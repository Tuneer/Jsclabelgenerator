<mat-sidenav-container class="sidenav-container">
  <!-- Mobile Sidebar -->
  <mat-sidenav #sidenav mode="over" [(opened)]="isSidenavOpen" class="mobile-sidenav">
    <div class="sidenav-header">
      <h2>{{ title }}</h2>
      <button mat-icon-button (click)="closeSidenav()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <mat-nav-list>
      <a mat-list-item 
         *ngFor="let link of navLinks" 
         [routerLink]="link.path" 
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{exact: link.exact}"
         (click)="closeSidenav()">
        <mat-icon matListItemIcon>{{ link.icon }}</mat-icon>
        <span matListItemTitle>{{ link.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
    <!-- Toolbar - Hidden on login page -->
    <mat-toolbar color="primary" class="main-toolbar" *ngIf="currentUser">
      <!-- Hamburger Menu (Mobile Only) -->
      <button mat-icon-button class="hamburger-menu" (click)="toggleSidenav()">
        <mat-icon>menu</mat-icon>
      </button>
      
      <span class="app-title">JSC Label Generator</span>
      <span class="spacer"></span>
      
      <!-- Desktop Navigation -->
      <nav class="nav-links">
        <a mat-button 
           *ngFor="let link of navLinks"
           [routerLink]="link.path" 
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: link.exact}">
          <mat-icon>{{ link.icon }}</mat-icon>
          <span>{{ link.label }}</span>
        </a>
      </nav>
      
      <!-- User Avatar with Dropdown Menu -->
      <div class="user-menu-container" *ngIf="currentUser">
        <button class="user-avatar-btn" (click)="toggleUserMenu()" matTooltip="User Menu">
          <span class="avatar-letter">{{ getUserInitial() }}</span>
        </button>
        
        <!-- Dropdown Menu -->
        <div class="user-dropdown" *ngIf="showUserMenu" (clickOutside)="closeUserMenu()">
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              <span>{{ getUserInitial() }}</span>
            </div>
            <div class="dropdown-user-info">
              <div class="dropdown-user-name">{{ currentUser.displayName }}</div>
              <div class="dropdown-user-role">{{ currentUser.role | titlecase }}</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" (click)="onLogout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </mat-toolbar>

    <div class="app-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
